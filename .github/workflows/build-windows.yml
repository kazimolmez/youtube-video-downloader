name: Paketle Windows (.exe)

# Etiket (v*) gönderildiğinde veya elle tetiklendiğinde .exe paketini üretir.
# Linux derlemesinden bağımsızdır (ayrı workflow) — biri başarısız olsa da diğeri üretir.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: ffmpeg ikililerini indir ve göm
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract
          New-Item -ItemType Directory -Force -Path packaging/vendor/ffmpeg | Out-Null
          Get-ChildItem -Recurse ffmpeg_extract -Include ffmpeg.exe,ffprobe.exe |
            ForEach-Object { Copy-Item $_.FullName packaging/vendor/ffmpeg/ }
      - name: QuickJS (JS runtime) indir ve göm
        shell: pwsh
        run: |
          # YouTube imza/challenge çözümü için bir JS ortamı şarttır; yoksa formatlar
          # eksik gelir ("Requested format is not available"). QuickJS küçük tek dosyadır
          # (~2 MB) -> onefile .exe içine sorunsuz gömülür. (Deno ~130 MB idi ve onefile
          # açılışında "Failed to extract deno.exe" hatasına yol açıyordu.)
          # resources.py gömülü ikiliyi 'qjs(.exe)' adıyla arar -> o adla kaydet.
          $url = "https://github.com/quickjs-ng/quickjs/releases/latest/download/qjs-windows-x86_64.exe"
          New-Item -ItemType Directory -Force -Path packaging/vendor/js | Out-Null
          Invoke-WebRequest -Uri $url -OutFile packaging/vendor/js/qjs.exe
      - name: Bağımlılıklar
        run: python -m pip install -r requirements.txt pyinstaller
      - name: .exe derle
        run: pyinstaller packaging/youtube-downloader.spec --noconfirm --clean
      - uses: actions/upload-artifact@v4
        with:
          name: youtube-downloader-exe
          path: dist/youtube-downloader.exe
